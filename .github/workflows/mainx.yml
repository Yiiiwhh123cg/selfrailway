          def launch_edge_guaranteed(target_url, edge_exe, proxy_server, use_proxy, lang_code, accept_lang, apply_masking=True, tz_iana="UTC", attempt_num=1):
              """
              Guaranteed Edge launch with anti-detect flags, Proxy and URL injection.
              """
              if not target_url or target_url.strip() == "":
                  log_msg("EdgeLaunch", f"CRITICAL: target_url is empty! Cannot launch Edge without URL.")
                  return False

              edge_candidates =[
                  edge_exe,
                  r"C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe",
                  r"C:\Program Files\Microsoft\Edge\Application\msedge.exe",
              ]
              resolved_exe = None
              for candidate in edge_candidates:
                  if candidate and os.path.exists(candidate):
                      resolved_exe = candidate
                      break

              if not resolved_exe:
                  log_msg("EdgeLaunch", "CRITICAL: Microsoft Edge executable not found in any known path!")
                  return False

              try:
                  os.system("taskkill /F /IM msedge.exe >nul 2>&1")
                  time.sleep(2)
              except Exception:
                  pass

              user_dir = os.path.join(tempfile.gettempdir(), f"EdgeProfile_{random.randint(100000, 999999)}")
              
              cmd_parts =[
                  f'"{resolved_exe}"',
                  f'--user-data-dir="{user_dir}"',
                  '--no-first-run',
                  '--no-default-browser-check',
                  '--disable-sync',
                  '--safebrowsing-disable-download-protection',
                  '--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled,WebRtcHideLocalIpsWithMdns,CalculateNativeWinOcclusion',
                  '--restore-last-session=false',
                  '--hide-crash-restore-window',
                  '--disable-blink-features=AutomationControlled',
                  '--force-webrtc-ip-handling-policy=disable_non_proxied_udp',
              ]

              if apply_masking:
                  cmd_parts.append(f'--lang={lang_code}')
                  cmd_parts.append(f'--accept-lang={accept_lang}')
                  if tz_iana and tz_iana != "UTC":
                      cmd_parts.append(f'--timezone="{tz_iana}"')

              if use_proxy and proxy_server and proxy_server.strip():
                  if "://" in proxy_server:
                      cmd_parts.append(f'--proxy-server="{proxy_server}"')
                  else:
                      cmd_parts.append(f'--proxy-server="http://{proxy_server}"')
                  log_msg("EdgeLaunch", f"Attempt {attempt_num}: Proxy injected via anti-detect isolation -> {proxy_server}")
              else:
                  log_msg("EdgeLaunch", f"Attempt {attempt_num}: Direct mode (no proxy)")

              cmd_parts.append(f'"{target_url.strip()}"')

              cmd = ' '.join(cmd_parts)
              log_msg("EdgeLaunch", f"Attempt {attempt_num} CMD: {cmd[:200]}...")

              try:
                  subprocess.Popen(cmd, shell=True)
                  log_msg("EdgeLaunch", f"Attempt {attempt_num}: Edge process spawned successfully.")
                  return True
              except Exception as e:
                  log_msg("EdgeLaunch", f"Attempt {attempt_num}: Popen failed: {e}")
                  try:
                      os.system(f'start "" {cmd}')
                      log_msg("EdgeLaunch", f"Attempt {attempt_num}: os.system fallback executed.")
                      return True
                  except Exception as e2:
                      log_msg("EdgeLaunch", f"Attempt {attempt_num}: os.system also failed: {e2}")
                      return False

          def verify_edge_has_url(edge_window, expected_url_fragment):
              if not edge_window:
                  return False
              try:
                  wt = (edge_window.window_text() or "").lower()
                  if len(wt.strip()) < 3:
                      return False
                  if wt.strip() in ["microsoft edge", "edge", "new tab", ""]:
                      return False
                  return True
              except Exception:
                  return False

          def verify_edge_launch(target_url, edge_exe, proxy_server, use_proxy, lang_code, accept_lang, apply_masking, tz_iana):
              for attempt in range(1, 6):
                  launch_edge_guaranteed(target_url, edge_exe, proxy_server, use_proxy, lang_code, accept_lang, apply_masking, tz_iana, attempt_num=attempt)
                  start_wait = time.time()
                  
                  if use_proxy and PROXY_USER and PROXY_PASS:
                      log_msg("EdgeLaunch", "Authenticated Proxy enabled. Waiting up to 10 seconds for proxy auth dialog...")
                      auth_found = False
                      while time.time() - start_wait < 10:
                          desktop_chk = Desktop(backend="uia")
                          try:
                              for w in desktop_chk.windows(visible_only=True):
                                  wt = w.window_text() or ""
                                  if _is_proxy_auth_dialog(wt):
                                      auth_found = True
                                      break
                                  if "Microsoft Edge" in wt or "Edge" in wt:
                                      u, p = _is_auth_dialog_by_structure(w)
                                      if u and p:
                                          auth_found = True
                                          break
                          except Exception: pass
                          
                          if auth_found: break
                          time.sleep(1)
                          
                      if auth_found:
                          log_msg("EdgeLaunch", "Proxy auth dialog detected! Edge launched correctly.")
                          return True
                      else:
                          log_msg("EdgeLaunch", "No proxy auth dialog detected within 10s. Edge failed to inject proxy/URL.")
                          os.system("taskkill /F /IM msedge.exe >nul 2>&1")
                          time.sleep(2)
                  else:
                      log_msg("EdgeLaunch", "Direct mode or Unauthenticated Proxy. Waiting up to 10 seconds for URL load...")
                      url_loaded = False
                      while time.time() - start_wait < 10:
                          desktop_chk = Desktop(backend="uia")
                          try:
                              for w in desktop_chk.windows(visible_only=True):
                                  wt = w.window_text() or ""
                                  if ("Microsoft Edge" in wt or "msedge" in wt.lower()) and verify_edge_has_url(w, target_url):
                                      url_loaded = True
                                      break
                          except Exception: pass
                          
                          if url_loaded: break
                          time.sleep(1)
                          
                      if url_loaded:
                          log_msg("EdgeLaunch", "URL loaded detected! Edge launched correctly.")
                          return True
                      else:
                          log_msg("EdgeLaunch", "URL did not load within 10s. Edge failed to inject URL.")
                          os.system("taskkill /F /IM msedge.exe >nul 2>&1")
                          time.sleep(2)
              return False

          def detect_edge_error(edge_window):
              try:
                  error_kw =[
                      "can't reach this page",
                      "err_connection_closed",
                      "err_proxy_connection_failed",
                      "err_connection_reset",
                      "err_connection_timed_out",
                      "site can't be reached",
                      "checking the proxy and the firewall",
                      "err_empty_response",
                      "err_network_changed"
                  ]
                  
                  title = (edge_window.window_text() or "").lower()
                  if any(kw in title for kw in error_kw):
                      return True
                  
                  try:
                      for doc in edge_window.descendants(control_type="Document"):
                          name = (doc.element_info.name or "").lower()
                          if any(kw in name for kw in error_kw):
                              return True
                  except Exception: pass
                  
                  try:
                      for text_el in edge_window.descendants(control_type="Text"):
                          txt = (text_el.window_text() or "").lower()
                          if any(kw in txt for kw in error_kw):
                              return True
                  except Exception: pass
                  
              except Exception:
                  pass
              return False

          def click_element_robust(el, label, fallback_x=None, fallback_y=None):
              clicked = False
              try:
                  el.click_input()
                  log_msg(label, "Clicked successfully via pywinauto click_input()")
                  clicked = True
              except Exception: pass

              if not clicked:
                  try:
                      el.invoke()
                      log_msg(label, "Clicked successfully via UIA Invoke pattern")
                      clicked = True
                  except Exception: pass

              if not clicked:
                  try:
                      rect = el.rectangle()
                      cx, cy = rect.mid_point().x, rect.mid_point().y
                      sw, sh = pyautogui.size()
                      if 0 <= cx <= sw and 0 <= cy <= sh:
                          pyautogui.moveTo(cx, cy, duration=0.2)
                          pyautogui.click()
                          time.sleep(0.1)
                          pyautogui.click()
                          log_msg(label, f"Clicked via PyAutoGUI explicit coordinates at ({cx}, {cy})")
                          clicked = True
                  except Exception: pass
                  
              return clicked

          def robust_click_download_button(edge_window, software_type):
              sw, sh = pyautogui.size()
              clicked_dl = False

              log_msg("DL-Engine", f"Pass 1: Scanning Button/Hyperlink/Text for download keywords...")
              try:
                  for ctrl_type in ["Button", "Hyperlink", "Text", "Pane", "Custom"]:
                      for el in edge_window.descendants(control_type=ctrl_type):
                          try:
                              txt = (el.window_text() or "").strip()
                              nm  = (el.element_info.name or "").strip()
                          except Exception:
                              continue
                          combined = f"{txt} {nm}".lower()
                          if not combined.strip():
                              continue
                          if len(combined) > 80:
                              continue
                          if any(kw in combined for kw in DOWNLOAD_BUTTON_KEYWORDS):
                              log_msg("DL-Engine", f"Pass 1 match: '{combined[:60]}' ({ctrl_type})")
                              if click_element_robust(el, "DL-Engine-P1"):
                                  clicked_dl = True
                                  return True
              except Exception as e:
                  log_msg("DL-Engine", f"Pass 1 failed: {e}")

              if not clicked_dl:
                  log_msg("DL-Engine", f"Pass 2: Broad descendant scan for download keywords...")
                  try:
                      for el in edge_window.descendants():
                          try:
                              txt = (el.window_text() or "").strip()
                          except Exception:
                              txt = ""
                          if not txt or len(txt) > 60:
                              continue
                          if any(kw in txt.lower() for kw in DOWNLOAD_BUTTON_KEYWORDS):
                              try:
                                  ctrl_type = el.element_info.control_type
                              except Exception:
                                  ctrl_type = "Unknown"
                              log_msg("DL-Engine", f"Pass 2 match: '{txt[:60]}' ({ctrl_type})")
                              if click_element_robust(el, "DL-Engine-P2"):
                                  clicked_dl = True
                                  return True
                  except Exception as e:
                      log_msg("DL-Engine", f"Pass 2 failed: {e}")

              if not clicked_dl:
                  log_msg("DL-Engine", f"Pass 3: Scanning automation IDs for download hints...")
                  dl_id_hints =["download", "cta", "btn-download", "hero-btn", "get-btn", "install-btn", "download-btn", "dl-btn"]
                  try:
                      for el in edge_window.descendants():
                          try:
                              aid = (el.element_info.automation_id or "").lower()
                              cls = (el.element_info.class_name or "").lower()
                          except Exception:
                              continue
                          if any(hint in aid or hint in cls for hint in dl_id_hints):
                              log_msg("DL-Engine", f"Pass 3 match via ID/class: aid='{aid}' cls='{cls}'")
                              if click_element_robust(el, "DL-Engine-P3"):
                                  clicked_dl = True
                                  return True
                  except Exception as e:
                      log_msg("DL-Engine", f"Pass 3 failed: {e}")

              if not clicked_dl:
                  log_msg("DL-Engine", f"Pass 4: Visual region scan for large buttons in hero area...")
                  try:
                      candidate_buttons =[]
                      for el in edge_window.descendants(control_type="Button"):
                          try:
                              rect = el.rectangle()
                              cx_el = rect.mid_point().x
                              cy_el = rect.mid_point().y
                              width = rect.right - rect.left
                              height = rect.bottom - rect.top
                              if width > 80 and height > 25 and cy_el < (sh * 0.75) and cx_el > (sw * 0.15) and cx_el < (sw * 0.85):
                                  txt = (el.window_text() or "").strip()
                                  nm  = (el.element_info.name or "").strip()
                                  candidate_buttons.append((width * height, el, cx_el, cy_el, txt or nm))
                          except Exception:
                              continue
                      candidate_buttons.sort(key=lambda x: x[0], reverse=True)
                      for area, el, cx_el, cy_el, label in candidate_buttons[:5]:
                          log_msg("DL-Engine", f"Pass 4 candidate: '{label[:40]}' size={area} at ({cx_el},{cy_el})")
                          skip_kw =["menu", "nav", "close", "sign", "log", "cookie", "privacy", "search", "home", "back", "settings"]
                          if any(s in label.lower() for s in skip_kw):
                              continue
                          if click_element_robust(el, "DL-Engine-P4"):
                              clicked_dl = True
                              return True
                  except Exception as e:
                      log_msg("DL-Engine", f"Pass 4 failed: {e}")

              return clicked_dl

          def _is_address_bar_control(ctrl):
              try:
                  wt  = (ctrl.window_text() or "").lower().strip()
                  aid = ""
                  cls = ""
                  try:
                      aid = (ctrl.element_info.automation_id or "").lower()
                  except Exception:
                      pass
                  try:
                      cls = (ctrl.element_info.class_name or "").lower()
                  except Exception:
                      pass
                  for name in ADDRESS_BAR_NAMES:
                      if name in wt or name in aid:
                          return True
                  for aid_kw in ADDRESS_BAR_AUTOMATION_IDS:
                      if aid_kw.lower() in aid:
                          return True
                  if "omnibox" in cls or "addressbar" in cls:
                          return True
              except Exception:
                  pass
              return False

          def _matches_any(text, keyword_list):
              if not text:
                  return False
              tl = text.lower().strip()
              return any(kw.lower() in tl for kw in keyword_list)

          def _matches_any_exact_start(text, keyword_list):
              if not text:
                  return False
              tl = text.lower().strip()
              for kw in keyword_list:
                  kwl = kw.lower().strip()
                  if tl == kwl or tl.startswith(kwl):
                      return True
              return False

          def _is_proxy_auth_dialog(window_text):
              if not window_text:
                  return False
              return _matches_any(window_text, PROXY_AUTH_TITLE_KEYWORDS)

          def _find_username_fields(container):
              results =[]
              try:
                  all_edits = container.descendants(control_type="Edit")
                  for ctrl in all_edits:
                      if _is_address_bar_control(ctrl):
                          continue
                      try:
                          wt = ctrl.window_text() or ""
                      except Exception:
                          wt = ""
                      try:
                          name = ctrl.element_info.name or ""
                      except Exception:
                          name = ""
                      label = (wt + " " + name).lower()
                      if _matches_any(label, USERNAME_FIELD_KEYWORDS):
                          results.append(ctrl)
              except Exception:
                  pass
              return results

          def _find_password_fields(container):
              results =[]
              try:
                  all_edits = container.descendants(control_type="Edit")
                  for ctrl in all_edits:
                      if _is_address_bar_control(ctrl):
                          continue
                      try:
                          wt = ctrl.window_text() or ""
                      except Exception:
                          wt = ""
                      try:
                          name = ctrl.element_info.name or ""
                      except Exception:
                          name = ""
                      label = (wt + " " + name).lower()
                      if _matches_any(label, PASSWORD_FIELD_KEYWORDS):
                          results.append(ctrl)
                          continue
                      try:
                          is_pwd = ctrl.get_property("IsPassword")
                          if is_pwd:
                              results.append(ctrl)
                              continue
                      except Exception:
                          pass
                      try:
                          cls = ctrl.element_info.class_name or ""
                          if "password" in cls.lower():
                              results.append(ctrl)
                      except Exception:
                          pass
              except Exception:
                  pass
              return results

          def _find_submit_button(container):
              try:
                  for btn in container.descendants(control_type="Button"):
                      try:
                          wt = btn.window_text() or ""
                      except Exception:
                          wt = ""
                      try:
                          name = btn.element_info.name or ""
                      except Exception:
                          name = ""
                      label = (wt + " " + name).strip()
                      if _matches_any(label, SUBMIT_BUTTON_KEYWORDS):
                          return btn
              except Exception:
                  pass
              return None

          def _is_auth_dialog_by_structure(window):
              try:
                  all_edits =[
                      c for c in window.descendants(control_type="Edit")
                      if not _is_address_bar_control(c)
                  ]
                  if len(all_edits) == 2:
                      return all_edits[0], all_edits[1]
              except Exception:
                  pass
              return None, None

          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)

          def _is_interference_window(text):
              if not text:
                  return False
              for exact in INTERFERENCE_TITLES:
                  if text.strip().lower() == exact.strip().lower():
                      return True
              tl = text.lower()
              for sub in INTERFERENCE_SUBSTRINGS:
                  if sub in tl:
                      return True
              return False

          def _is_target_software_window(text, software_type):
              if not text:
                  return False
              tl = text.lower()
              if software_type == "avg":
                  return "avg" in tl
              elif software_type in ["opera_gx"]:
                  return ("opera" in tl and "gx" in tl) or "opera gx" in tl
              elif software_type in["opera_one", "opera_smart_link", "dynamic_opera", "ad_mvn"]:
                  return "opera" in tl and "edge" not in tl and "chrome web store" not in tl
              return False

          def dismiss_interference_windows(desktop, software_type, label=""):
              dismissed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception:
                  return False

              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt:
                          continue
                      if "Microsoft Edge" in wt or "msedge" in wt.lower():
                          continue
                      if _is_target_software_window(wt, software_type):
                          continue
                      if not _is_interference_window(wt):
                          continue

                      log_msg("WinGuard", f"Interference window detected: '{wt}'[{label}]")
                      closed = False

                      try:
                          window.set_focus()
                          time.sleep(0.25)
                          send_keys('%{F4}')
                          time.sleep(0.4)
                          closed = True
                          log_msg("WinGuard", f"Closed '{wt}' via Alt+F4.")
                      except Exception as e:
                          log_msg("WinGuard", f"Alt+F4 failed for '{wt}': {e}")

                      if not closed:
                          try:
                              window.close()
                              time.sleep(0.3)
                              closed = True
                              log_msg("WinGuard", f"Closed '{wt}' via window.close().")
                          except Exception as e:
                              log_msg("WinGuard", f"window.close() failed for '{wt}': {e}")

                      if not closed:
                          try:
                              window.minimize()
                              time.sleep(0.25)
                              log_msg("WinGuard", f"Minimized '{wt}' as fallback.")
                              closed = True
                          except Exception as e:
                              log_msg("WinGuard", f"minimize() failed for '{wt}': {e}")

                      if closed:
                          dismissed_any = True

                  except Exception:
                      pass

              return dismissed_any

          def robust_maximize_opera_window(desktop, software_type, label=""):
              found_window = None

              dismiss_interference_windows(desktop, software_type, label=f"{label}-pre-dismiss")
              time.sleep(0.3)

              for attempt in range(1, 6):
                  log_msg("MaximizeOp", f"[{label}] Window search attempt {attempt}/5...")
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              log_msg("MaximizeOp", f"[{label}] Found Opera window: '{wt}'")
                              break
                  except Exception as e:
                      log_msg("MaximizeOp", f"[{label}] Window search error: {e}")

                  if found_window:
                      break
                  log_msg("MaximizeOp", f"[{label}] Opera window not found yet. Waiting 3s...")
                  time.sleep(3)

              if not found_window:
                  log_msg("MaximizeOp", f"[{label}] ERROR: Opera window not found after 5 attempts.")
                  return None

              log_msg("MaximizeOp", f"[{label}] Starting robust maximize sequence...")

              try:
                  found_window.set_focus()
                  time.sleep(0.4)
                  found_window.maximize()
                  time.sleep(0.5)
                  log_msg("MaximizeOp", f"[{label}] Strategy 1 (pywinauto maximize): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 1 failed: {e}")

              try:
                  found_window.set_focus()
                  time.sleep(0.3)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}')
                  time.sleep(0.4)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}')
                  time.sleep(0.4)
                  log_msg("MaximizeOp", f"[{label}] Strategy 2 (Win+Up x2): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 2 failed: {e}")

              try:
                  hwnd = found_window.handle
                  ctypes.windll.user32.ShowWindow(hwnd, 9)
                  time.sleep(0.4)
                  log_msg("MaximizeOp", f"[{label}] Strategy 3 (ctypes SW_MAXIMIZE): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 3 failed: {e}")

              try:
                  user32 = ctypes.windll.user32
                  sw = user32.GetSystemMetrics(0)
                  sh = user32.GetSystemMetrics(1)
                  hwnd = found_window.handle
                  user32.SetWindowPos(hwnd, -1, 0, 0, sw, sh, 0x0040 | 0x0020)
                  time.sleep(0.3)
                  user32.SetWindowPos(hwnd, -2, 0, 0, sw, sh, 0x0040 | 0x0020)
                  time.sleep(0.3)
                  log_msg("MaximizeOp", f"[{label}] Strategy 4 (SetWindowPos {sw}x{sh}): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 4 failed: {e}")

              try:
                  found_window.set_focus()
                  time.sleep(0.2)
                  found_window.maximize()
                  time.sleep(0.3)
                  found_window.set_focus()
                  time.sleep(0.2)
                  log_msg("MaximizeOp", f"[{label}] Strategy 5 (final focus+maximize): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 5 failed: {e}")

              log_msg("MaximizeOp", f"[{label}] Robust maximize sequence complete. Window: '{found_window.window_text()}'")
              return found_window

          def force_maximize_and_focus_target(desktop, target_window, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-dismiss")
              time.sleep(0.3)

              found_window = target_window
              if found_window is None:
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              break
                  except Exception:
                      pass

              if found_window is None:
                  log_msg("WinGuard", f"[{label}] No target window found to maximize/focus.")
                  return None

              try:
                  found_window.set_focus()
                  time.sleep(0.2)
                  found_window.maximize()
                  time.sleep(0.3)
                  found_window.set_focus()
                  time.sleep(0.2)
                  log_msg("WinGuard", f"[{label}] Target window maximized and focused: '{found_window.window_text()}'")
                  return found_window
              except Exception as e:
                  log_msg("WinGuard", f"[{label}] maximize/focus failed: {e}")
                  return found_window

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception: return False

              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue

                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt):
                                      is_match = True
                                      break
                          except Exception: pass

                      if not is_match: continue

                      log_msg("EdgeClose", f"Targeting Edge window '{wt}' for close (Attempt {attempt_label})")
                      closed = False

                      try:
                          log_msg("EdgeClose", "Focusing Edge window...")
                          window.set_focus()
                          time.sleep(0.4)
                          sw, sh = pyautogui.size()
                          cx, cy = sw // 2, sh // 2
                          pyautogui.click(cx, cy)
                          time.sleep(0.5)
                          log_msg("EdgeClose", "Sending Ctrl+W (1st) — close current tab...")
                          send_keys('^w')
                          time.sleep(0.5)
                          log_msg("EdgeClose", "Sending Ctrl+W (2nd) — close remaining tabs...")
                          send_keys('^w')
                          time.sleep(0.4)
                          closed = True
                          log_msg("EdgeClose", "Ctrl+W executed successfully.")
                      except Exception as e:
                          log_msg("EdgeClose", f"Ctrl+W sequence failed: {e}")

                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.4)
                              send_keys('^j')
                              time.sleep(0.6)
                              send_keys('^j')
                              time.sleep(0.4)
                              closed = True
                              log_msg("EdgeClose", "Ctrl+J double-tap executed.")
                          except Exception as e:
                              log_msg("EdgeClose", f"Ctrl+J fallback failed: {e}")

                      if not closed:
                          try:
                              window.close()
                              closed = True
                              log_msg("EdgeClose", "window.close() executed.")
                          except Exception as e:
                              log_msg("EdgeClose", f"window.close() failed: {e}")

                      if closed:
                          closed_any = True
                          time.sleep(0.5)
                  except Exception: pass
              return closed_any

          def refocus_target_window(target_window, software_type, label=""):
              desktop = Desktop(backend="uia")
              result = force_maximize_and_focus_target(desktop, target_window, software_type, label=label)
              return result if result else target_window

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL OPERA BUTTON CLICKER
          # ══════════════════════════════════════════════════════════════════════
          def click_opera_button_multilingual(desktop, opera_window, software_type,
                                              keyword_list, label="", fallback_coords=None):
              
              def physical_click(ctrl, tag):
                  try:
                      rect = ctrl.rectangle()
                      cx, cy = rect.mid_point().x, rect.mid_point().y
                      sw_max, sh_max = pyautogui.size()
                      if 0 <= cx <= sw_max and 0 <= cy <= sh_max:
                          pyautogui.moveTo(cx, cy, duration=0.2)
                          pyautogui.click()
                          log_msg("MLBtn", f"[{label}] ({tag}) Physically clicked at ({cx}, {cy}).")
                          return True
                  except Exception as err:
                      log_msg("MLBtn", f"[{label}] ({tag}) Physical physical click failed: {err}")
                  return False

              try:
                  target = opera_window
                  if target is None or not target.is_visible():
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              target = w
                              break
                  if not target:
                      log_msg("MLBtn", f"[{label}] Target Opera window not found.")
                      if fallback_coords:
                          fx, fy = fallback_coords
                          log_msg("MLBtn", f"[{label}] Fallback click at ({fx}, {fy})...")
                          try:
                              pyautogui.moveTo(fx, fy, duration=0.2)
                              pyautogui.click(fx, fy)
                              return True
                          except Exception as ef:
                              log_msg("MLBtn", f"[{label}] Fallback click failed: {ef}")
                      return False

                  target.set_focus()
                  time.sleep(0.3)

                  for kw in keyword_list:
                      try:
                          btns = target.descendants(control_type="Button", title=kw)
                          if btns:
                              if physical_click(btns[0], "Pass1 Exact"): return True
                              try:
                                  btns[0].click_input()
                                  log_msg("MLBtn", f"[{label}] Clicked '{kw}' via click_input exact match.")
                                  return True
                              except Exception as e:
                                  log_msg("MLBtn", f"[{label}] click_input on exact '{kw}' failed: {e}")
                      except Exception:
                          pass

                  for btn in target.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                          nm  = (btn.element_info.name or "").strip()
                          combined = (txt + " " + nm).strip()
                      except Exception:
                          continue
                      if combined and _matches_any(combined, keyword_list):
                          if physical_click(btn, "Pass2 Partial"): return True
                          try:
                              btn.click_input()
                              log_msg("MLBtn", f"[{label}] Clicked '{combined[:40]}' via partial keyword match.")
                              return True
                          except Exception as e:
                              log_msg("MLBtn", f"[{label}] Partial match click failed for '{combined[:40]}': {e}")

                  for el in target.descendants():
                      try:
                          ctrl_type = el.element_info.control_type
                      except Exception:
                          continue
                      if ctrl_type not in["Button", "Hyperlink", "Text", "Custom"]:
                          continue
                      try:
                          txt = (el.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      if not txt or len(txt) > 80:
                          continue
                      if _matches_any(txt, keyword_list):
                          if physical_click(el, "Pass3 Descendant"): return True
                          try:
                              el.click_input()
                              log_msg("MLBtn", f"[{label}] Clicked '{txt[:40]}' via generic descendant scan.")
                              return True
                          except Exception as e:
                              log_msg("MLBtn", f"[{label}] Descendant click failed for '{txt[:40]}': {e}")

              except Exception as e:
                  log_msg("MLBtn", f"[{label}] Exception during multilingual button click: {e}")

              if fallback_coords:
                  fx, fy = fallback_coords
                  log_msg("MLBtn", f"[{label}] All passes failed — fallback click at ({fx}, {fy}).")
                  try:
                      pyautogui.moveTo(fx, fy, duration=0.2)
                      pyautogui.click(fx, fy)
                      return True
                  except Exception as ef:
                      log_msg("MLBtn", f"[{label}] Fallback click also failed: {ef}")

              return False

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL PROXY AUTH INJECTION
          # ══════════════════════════════════════════════════════════════════════
          def inject_proxy_auth(window, label=""):
              if not USE_PROXY or not PROXY_USER or not PROXY_PASS:
                  return False

              try:
                  user_fields = _find_username_fields(window)
                  pass_fields = _find_password_fields(window)

                  if not user_fields or not pass_fields:
                      u_struct, p_struct = _is_auth_dialog_by_structure(window)
                      if u_struct and p_struct:
                          log_msg("ProxyAuth", f"[{label}] Using structural detection (2-field dialog).")
                          user_fields = [u_struct]
                          pass_fields =[p_struct]

                  if user_fields and pass_fields:
                      if _is_address_bar_control(user_fields[0]) or _is_address_bar_control(pass_fields[0]):
                          log_msg("ProxyAuth", f"[{label}] BLOCKED — detected fields are address/URL bars. Skipping.")
                          return False

                      log_msg("ProxyAuth", f"[{label}] Auth dialog — injecting {PROXY_TYPE} credentials. "
                              f"User={PROXY_USER[:25]}... | Fields found via multilingual match.")
                      window.set_focus()
                      time.sleep(0.5)

                      try:
                          user_fields[0].click_input()
                          time.sleep(0.2)
                          send_keys('^a')
                          time.sleep(0.1)
                          send_keys('{DELETE}')
                          time.sleep(0.1)
                          user_fields[0].type_keys(PROXY_USER, with_spaces=True, pause=0.02)
                          time.sleep(0.3)
                      except Exception as eu:
                          log_msg("ProxyAuth", f"[{label}] Username field type failed: {eu}")

                      try:
                          pass_fields[0].click_input()
                          time.sleep(0.2)
                          send_keys('^a')
                          time.sleep(0.1)
                          send_keys('{DELETE}')
                          time.sleep(0.1)
                          pass_fields[0].type_keys(PROXY_PASS, with_spaces=True, pause=0.02)
                          time.sleep(0.3)
                      except Exception as ep:
                          log_msg("ProxyAuth", f"[{label}] Password field type failed: {ep}")

                      signed_in = False
                      submit_btn = _find_submit_button(window)
                      if submit_btn:
                          try:
                              submit_btn.click_input()
                              btn_text = submit_btn.window_text() or "?"
                              log_msg("ProxyAuth", f"[{label}] Clicked submit button: '{btn_text}'. Auth submitted.")
                              signed_in = True
                          except Exception as eb:
                              log_msg("ProxyAuth", f"[{label}] Submit button click failed: {eb}")

                      if not signed_in:
                          try:
                              pass_fields[0].click_input()
                              time.sleep(0.2)
                              send_keys('{ENTER}')
                              log_msg("ProxyAuth", f"[{label}] Submitted via ENTER key fallback.")
                              signed_in = True
                          except Exception as ek:
                              log_msg("ProxyAuth", f"[{label}] ENTER fallback also failed: {ek}")

                      return signed_in

                  else:
                      wt = ""
                      try:
                          wt = window.window_text() or ""
                      except Exception:
                          pass

                      if not _is_proxy_auth_dialog(wt):
                          log_msg("ProxyAuth", f"[{label}] No auth fields found and window '{wt}' "
                                  "does not look like an auth dialog. Skipping keyboard injection.")
                          return False

                      log_msg("ProxyAuth", f"[{label}] No Edit fields found — trying keyboard Tab injection "
                              f"(window='{wt}').")
                      window.set_focus()
                      time.sleep(0.5)
                      send_keys('^a{DELETE}')
                      time.sleep(0.1)
                      for ch in PROXY_USER:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch)
                          time.sleep(0.01)
                      send_keys('{TAB}')
                      time.sleep(0.3)
                      send_keys('^a{DELETE}')
                      time.sleep(0.1)
                      for ch in PROXY_PASS:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch)
                          time.sleep(0.01)
                      time.sleep(0.2)
                      send_keys('{ENTER}')
                      log_msg("ProxyAuth", f"[{label}] Keyboard-only auth submitted.")
                      return True

              except Exception as e:
                  log_msg("ProxyAuth", f"[{label}] inject_proxy_auth exception: {e}")
                  return False

